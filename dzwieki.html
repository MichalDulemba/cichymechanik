<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Posłuchaj — Cichy Mechanik</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
<link rel="icon" href="graphics/favicon.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #faf9f6; --paper: #f4f1eb; --ink: #1a1915; --ink-soft: #5a5850;
    --ink-muted: #9a9890; --line: #e0ddd6;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --mono: 'DM Mono', monospace;
    --sans: 'Outfit', sans-serif;
    --max: 1200px;
    --accent-office: #7a8a6a;
    --accent-gaming: #c84b2f;
  }

  html { scroll-behavior: smooth; }
  body { background: var(--cream); color: var(--ink); font-family: var(--mono); font-size: 13px; line-height: 1.7; -webkit-font-smoothing: antialiased; }

  .wrap { max-width: var(--max); margin: 0 auto; padding: 0 48px; }

  /* HERO */
  .hero { padding: 64px 0 48px; border-bottom: 0.5px solid var(--line); }
  .hero-eyebrow { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 16px; }
  .hero-title { font-family: var(--serif); font-size: clamp(36px, 5vw, 56px); font-weight: 300; line-height: 1.1; margin-bottom: 16px; }
  .hero-title em { font-style: italic; color: var(--ink-soft); }
  .hero-sub { font-size: 13px; color: var(--ink-muted); max-width: 480px; }

  /* MAIN LAYOUT */
  .player-layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 0;
    min-height: calc(100vh - 280px);
    border-top: 0.5px solid var(--line);
  }

  /* LEFT — build list */
  .build-list { border-right: 0.5px solid var(--line); }

  .build-item {
    display: flex;
    align-items: center;
    padding: 16px 28px;
    border-bottom: 0.5px solid var(--line);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    gap: 16px;
  }

  .build-item:hover { background: var(--paper); }
  .build-item.active { background: var(--paper); }

  .build-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--ink);
  }

  .build-thumb {
    width: 68px; height: 46px;
    background: var(--paper);
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .build-thumb img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }

  .build-info { flex: 1; min-width: 0; }

  .build-tag {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 3px;
    display: flex; align-items: center; gap: 5px;
  }

  .tag-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
  .tag-office { color: var(--accent-office); }
  .tag-office .tag-dot { background: var(--accent-office); }
  .tag-gaming { color: var(--accent-gaming); }
  .tag-gaming .tag-dot { background: var(--accent-gaming); }

  .build-name {
    font-family: var(--serif);
    font-size: 15px; font-weight: 300; line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .build-sub {
    font-size: 11px; color: var(--ink-muted); margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .sound-badge {
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 2px 7px; border-radius: 2px; flex-shrink: 0;
  }
  .sound-silent { background: #eef3ee; color: #7a8a6a; }
  .sound-medium { background: #fdf5e6; color: #c8a030; }
  .sound-loud   { background: #fdf0ed; color: #c84b2f; }

  /* RIGHT — panel */
  .player-panel {
    padding: 32px 28px;
    display: flex; flex-direction: column;
    position: sticky; top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }

  .panel-eyebrow {
    font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--ink-muted); margin-bottom: 16px;
  }

  /* YouTube / placeholder area */
  .panel-media {
    width: 100%; aspect-ratio: 16/9;
    background: var(--paper);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 20px;
    position: relative;
  }

  .panel-media iframe {
    width: 100%; height: 100%;
    border: none; display: block;
  }

  .panel-media-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; color: var(--ink-muted);
  }

  .panel-media-placeholder .pm-icon {
    font-size: 28px; opacity: 0.25;
  }

  .panel-media-placeholder .pm-label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  }

  .panel-media-img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    filter: brightness(0.85);
  }

  .panel-media-soon {
    position: absolute;
    bottom: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(26,25,21,0.7);
    color: var(--cream);
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    padding: 4px 10px; border-radius: 2px;
    white-space: nowrap;
  }

  .panel-name {
    font-family: var(--serif);
    font-size: 24px; font-weight: 300; line-height: 1.2;
    margin-bottom: 4px;
  }

  .panel-sub {
    font-size: 11px; color: var(--ink-muted); margin-bottom: 20px;
  }

  .panel-price {
    font-family: var(--serif);
    font-size: 26px; font-weight: 300;
    margin-bottom: 14px; color: var(--ink);
  }

  .view-build {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px;
    border: 0.5px solid var(--line); border-radius: 1px;
    color: var(--ink-soft); font-family: var(--mono);
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    text-decoration: none; transition: all 0.15s;
  }
  .view-build:hover { border-color: var(--ink); color: var(--ink); }

  .panel-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; text-align: center;
    color: var(--ink-muted);
  }

  .panel-empty .pe-icon { font-size: 36px; opacity: 0.2; }
  .panel-empty .pe-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; }

  /* FOOTER */
  footer { border-top: 0.5px solid var(--line); padding: 40px 0; }
  .footer-inner { max-width: var(--max); margin: 0 auto; padding: 0 48px; display: flex; align-items: center; justify-content: space-between; }
  .footer-logo { font-family: var(--sans); font-size: 18px; font-weight: 300; letter-spacing: 0.5px; }
  .footer-links { display: flex; gap: 24px; list-style: none; }
  .footer-links a { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-muted); text-decoration: none; transition: color 0.2s; }
  .footer-links a:hover { color: var(--ink); }
  .footer-note { font-size: 10px; color: var(--ink-muted); }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .wrap { padding-left: 24px; padding-right: 24px; }
    .player-layout { grid-template-columns: 1fr; }
    .build-list { border-right: none; }
    .player-panel { position: static; height: auto; border-top: 0.5px solid var(--line); padding: 24px; }
    .footer-inner { padding: 0 24px; flex-direction: column; gap: 16px; text-align: center; }
    .footer-links { justify-content: center; }
  }
</style>
</head>
<body>

<script src="i18n.js"></script>
<div id="nav"></div>
<script src="nav.js"></script>

<div class="wrap">
  <div class="hero">
    <p class="hero-eyebrow" data-t="dzwieki_eyebrow">Porównaj brzmienie</p>
    <h1 class="hero-title" data-t-html="dzwieki_title">Usłysz zanim<br><em>kupisz.</em></h1>
    <p class="hero-sub" data-t="dzwieki_sub">Kliknij build, posłuchaj jak brzmi. Każda klawiatura nagrana w tych samych warunkach.</p>
  </div>
</div>

<div style="max-width:var(--max);margin:0 auto;">
  <div class="player-layout">

    <div class="build-list" id="build-list"></div>

    <div class="player-panel" id="player-panel">
      <p class="panel-eyebrow" data-t="dzwieki_panel_eyebrow">Test dźwięku</p>
      <div class="panel-empty">
        <span class="pe-icon">♫</span>
        <span class="pe-label" data-t="dzwieki_select">Wybierz build</span>
      </div>
    </div>

  </div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-logo">Cichy Mechanik</div>
    <ul class="footer-links">
      <li><a href="blog/index.html">Blog</a></li>
      <li><a href="o-mnie.html" data-t="footer_about">O mnie</a></li>
      <li><a href="regulamin.html" data-t="footer_terms">Regulamin</a></li>
      <li><a href="https://youtube.com/@cichymechanik" target="_blank">YouTube</a></li>
    </ul>
    <p class="footer-note"><span data-t="footer_location">Żory · Śląsk · 2026</span> · <span id="site-ver"></span></p>
  </div>
</footer>

<script>
const builds = [
  { id: 'build-01', name: 'Caramel 800', sub: 'Vintage Terminal',
    tag: 'silent-office', sound: 'medium', price: '649 PLN',
    img: 'graphics/build01/1.jpg', ytId: 'GPQWhZ_5Ayk' },
  { id: 'build-02', name: 'Iron Yokai', sub: 'Red Signal',
    tag: 'gaming-rgb', sound: 'loud', price: '399 PLN',
    img: 'graphics/build02/1.jpg', ytId: 'tEBAmwBWeVM' },
  { id: 'build-03', name: 'Arctic Angel', sub: 'Unit 00',
    tag: 'gaming-rgb', sound: 'medium', price: '499 PLN',
    img: 'graphics/build03/1.jpg', ytId: 'mxoY_yTUsZI' },
  { id: 'build-04', name: 'Mamba Strike', sub: 'Jade & Gold',
    tag: 'gaming-rgb', sound: 'loud', price: '449 PLN',
    img: 'graphics/build04/1.jpg', ytId: 'aLQYjV6sn08' },
  { id: 'build-05', name: 'Hello World', sub: 'Debug Mode',
    tag: 'silent-office', sound: 'medium', price: '429 PLN',
    img: 'graphics/build05/1.jpg', ytId: 'UgeoXEASnAQ' },
  { id: 'build-06', name: 'Nocturne', sub: 'Quiet Signal',
    tag: 'silent-office', sound: 'medium', price: '399 PLN',
    img: 'graphics/build06/1.jpg', ytId: 'AAvMmGsOjtY' },
  { id: 'build-07', name: 'Night City', sub: 'Neon District',
    tag: 'gaming-rgb', sound: 'loud', price: '449 PLN',
    img: 'graphics/build07/1.jpg', ytId: '7MKp3qz0-5s' },
  { id: 'build-08', name: 'Broken Protocol', sub: 'Decay Interface',
    tag: 'gaming-rgb', sound: 'loud', price: '349 PLN',
    img: 'graphics/build08/1.jpg', ytId: 'k4F_5dMOEoI' },
  { id: 'build-09', name: 'Prism Shift', sub: 'Chromatic Flow',
    tag: 'gaming-rgb', sound: 'silent', price: '499 PLN',
    img: 'graphics/build09/1.jpg', ytId: 'h2lT-ODttqU' },
  { id: 'build-10', name: 'Botanical Ghost', sub: 'Silent Kernel',
    tag: 'silent-office', sound: 'silent', price: '399 PLN',
    img: 'graphics/build10/1.jpg', ytId: '' },
  { id: 'build-11', name: 'Silent Jade', sub: 'Glacial Grid',
    tag: 'silent-office', sound: 'silent', price: '399 PLN',
    img: 'graphics/build11/1.jpg', ytId: '' },
  { id: 'build-12', name: 'Solar Flare', sub: 'Milky Trace',
    tag: 'gaming-rgb', sound: 'medium', price: '399 PLN',
    img: 'graphics/build12/1.jpg', ytId: '' },
  { id: 'build-13', name: 'Smoothie Override', sub: 'Frame Rate',
    tag: 'gaming-rgb', sound: 'loud', price: '— PLN',
    img: 'graphics/build13/1.jpg', ytId: '' },
  { id: 'build-14', name: 'Silent BlackBerry', sub: 'Crimson Pulse',
    tag: 'silent-office', sound: 'silent', price: '— PLN',
    img: 'graphics/build14/1.jpg', ytId: '' },
];

const soundLabels = { silent: 'Silent', medium: 'Medium', loud: 'Loud' };

let current = null;

function renderList() {
  document.getElementById('build-list').innerHTML = builds.map((b, i) => {
    const isGaming = b.tag === 'gaming-rgb';
    const tagClass = isGaming ? 'tag-gaming' : 'tag-office';
    const tagLabel = isGaming ? 'Gaming RGB' : 'Silent Office';
    return `
    <div class="build-item" id="item-${b.id}" onclick="selectBuild(${i})">
      <div class="build-thumb">
        <img src="${b.img}" alt="${b.name}"
          onerror="this.parentElement.innerHTML='<span style=\\'display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:18px;color:var(--ink-muted)\\'>⌨</span>'">
      </div>
      <div class="build-info">
        <div class="build-tag ${tagClass}"><span class="tag-dot"></span>${tagLabel}</div>
        <div class="build-name">${b.name} · ${b.sub}</div>
        <div class="build-sub">${b.price}</div>
      </div>
      <span class="sound-badge sound-${b.sound}">${soundLabels[b.sound]}</span>
    </div>`;
  }).join('');
}

function selectBuild(idx) {
  const b = builds[idx];

  if (current !== null) {
    document.getElementById(`item-${builds[current].id}`)?.classList.remove('active');
  }
  current = idx;
  document.getElementById(`item-${b.id}`)?.classList.add('active');

  const panel = document.getElementById('player-panel');

  let mediaHtml;
  if (b.ytId) {
    mediaHtml = `<div class="panel-media">
      <iframe
        src="https://www.youtube.com/embed/${b.ytId}?rel=0&modestbranding=1"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen></iframe>
    </div>`;
  } else {
    mediaHtml = `<div class="panel-media">
      <img class="panel-media-img" src="${b.img}" alt="${b.name}"
        onerror="this.style.display='none'">
      <div class="panel-media-soon">${(window.I18N && window.I18N[window.LANG||'pl'].dzwieki_coming_soon)||'Nagranie wkrótce'}</div>
    </div>`;
  }

  const _dt = (window.I18N && window.I18N[window.LANG||'pl']) || {};
  panel.innerHTML = `
    <p class="panel-eyebrow">${_dt.dzwieki_panel_eyebrow||'Test dźwięku'}</p>
    ${mediaHtml}
    <div class="panel-name">${b.name} <span style="color:var(--ink-muted);font-weight:300">· ${b.sub}</span></div>
    <div class="panel-sub">${soundLabels[b.sound]} · ${b.tag === 'gaming-rgb' ? 'Gaming RGB' : 'Silent Office'}</div>
    <div class="panel-price">${b.price}</div>
    <a href="index.html#${b.id}" class="view-build">${window.LANG==='en'?'View build →':'Zobacz build →'}</a>`;

  if (window.innerWidth <= 900) {
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

renderList();
</script>
<script src="ver.js"></script>
<script>const _v = document.getElementById('site-ver'); if (_v && window.SITE_VER) _v.textContent = window.SITE_VER;</script>

</body>
</html>
